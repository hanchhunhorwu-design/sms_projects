{% load static %}
<!doctype html>
<html>
  <head>
    <title>Add Student</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'students/css/style.css' %}" />
  </head>

  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card shadow-lg p-4 form-card">
        <h2 class="text-center text-success mb-4">➕ Add Student</h2>

        <form method="POST">
          {% csrf_token %}

          <!-- Name -->
          <div class="mb-3">
            <label class="form-label">Student Name</label>
            <input
              type="text"
              name="name"
              class="form-control"
              placeholder="Enter name"
              required
            />
          </div>

          <!-- ID -->
          <div class="mb-3">
            <label class="form-label">Student ID</label>
            <input
              type="text"
              name="student_id"
              class="form-control"
              placeholder="Enter student ID"
              required
             />

          <!-- Age -->
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input
              type="number"
              name="age"
              class="form-control"
              placeholder="Enter age"
              required
            />
          </div>

          <!-- Course -->
          <div class="mb-3">
            <label class="form-label">Course</label>
            <input
              type="text"
              name="course"
              class="form-control"
              placeholder="Enter course"
              required
            />
          </div>

          <!-- Buttons -->
          <button type="submit" class="btn btn-success w-100 mb-2">
            Save Student
          </button>

          <a
            href="{% url 'students:student_list' %}"
            class="btn btn-secondary w-100"
          >
            Back to List
          </a>
        </form>
      </div>
    </div>
  </body>
</html>
