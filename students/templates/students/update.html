<!doctype html>
<html>
  <head>
    <title>Update Student</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card p-4 shadow-sm">
        <h2 class="text-warning">✏️ Update Student</h2>

        <form method="POST">
          {% csrf_token %}

          <input
            type="text"
            name="name"
            value="{{ student.name }}"
            class="form-control mb-2"
          />

          <input
            type="number"
            name="ID"
            value="{{ student.ID }}"
            class="form-control mb-2"
          />

          <input
            type="number"
            name="age"
            value="{{ student.age }}"
            class="form-control mb-2"
          />

          <input
            type="text"
            name="course"
            value="{{ student.course }}"
            class="form-control mb-3"
          />

          <button class="btn btn-warning w-100">Update</button>

          <a
            href="{% url 'students:student_list' %}"
            class="btn btn-secondary w-100 mt-2"
            >Back</a
          >
        </form>
      </div>
    </div>
  </body>
</html>
